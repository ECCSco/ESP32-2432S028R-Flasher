      this.readLoop();

      let chipMagicValue = await this.readRegister(CHIP_DETECT_MAGIC_REG_ADDR);
      let chip = CHIP_DETECT_MAGIC_VALUES[chipMagicValue >>> 0];
      if (chip === undefined) throw new Error(`Unknown Chip: ${toHex(chipMagicValue >>> 0, 8)}`);
      this.chipName = chip.name;
      this.chipFamily = chip.family;
      this.logger.log(`Chip type ${this.chipName}`);
    }
    async readLoop() {
      this._reader = this.port.readable.getReader();
      try {
        while (true) {
          const { value, done } = await this._reader.read();
          if (done) { this._reader.releaseLock(); break; }
          if (value && value.length) this._inputBuffer.push(...Array.from(value));
        }
      } catch (err) {}
      this.connected = false;
      this.dispatchEvent(new Event("disconnect"));
    }
    async setRTS(state) { await this.port.setSignals({ requestToSend: state }); await this.setDTR(this.state_DTR); }
    async setDTR(state) { this.state_DTR = state; await this.port.setSignals({ dataTerminalReady: state }); }
    async hardReset(bootloader = false) {
      this.logger.log("Hard reset.");
      if (bootloader) {
        if (this.port.getInfo().usbProductId === USB_JTAG_SERIAL_PID) {
          await this.setDTR(false); await this.setRTS(false); await sleep(100);
          await this.setDTR(true); await this.setRTS(false); await sleep(100);
          await this.setRTS(true); await this.setDTR(false); await sleep(100);
          await this.setRTS(true); await sleep(100);
          await this.setDTR(false); await this.setRTS(false);
        } else {
          await this.setDTR(false); await this.setRTS(true); await sleep(100);
          await this.setDTR(true); await this.setRTS(false); await sleep(50);
          await this.setDTR(false);
        }
      } else {
        await this.setRTS(true); await sleep(100); await this.setRTS(false);
      }
      await sleep(1000);
    }
    async readRegister(reg) {
      let packet = pack("<I", reg);
      await this.sendCommand(ESP_READ_REG, packet);
      let [val, _data] = await this.getResponse(ESP_READ_REG);
      return val;
    }
    async checkCommand(opcode, buffer, checksum = 0, timeout = DEFAULT_TIMEOUT) {
      timeout = Math.min(timeout, MAX_TIMEOUT);
      await this.sendCommand(opcode, buffer, checksum);
      let [value, data] = await this.getResponse(opcode, timeout);
      if (data === null) throw new Error("Didn't get enough status bytes");
      let statusLen = (this.IS_STUB || this.chipFamily === CHIP_FAMILY_ESP8266) ? 2 : 4;
      if (data.length < statusLen) throw new Error("Didn't get enough status bytes");
      let status = data.slice(-statusLen);
      data = data.slice(0, -statusLen);
      if (status[0] == 1) throw new Error(`Command failure error code ${toHex(status[1])}`);
      return [value, data];
    }
    async sendCommand(opcode, buffer, checksum = 0) {
      let packet = slipEncode([...pack("<BBHI", 0x00, opcode, buffer.length, checksum), ...buffer]);
      await this.writeToStream(packet);
    }
    async readPacket(timeout) {
      let partialPacket = null, inEscape = false, readBytes = [];
      while (true) {
        let stamp = Date.now();
        readBytes = [];
        while (Date.now() - stamp < timeout) {
          if (this._inputBuffer.length > 0) { readBytes.push(this._inputBuffer.shift()); break; }
          else await sleep(10);
        }
        if (readBytes.length == 0) throw new Error("Timed out waiting for packet");
        for (let b of readBytes) {
          if (partialPacket === null) {
            if (b == 0xc0) partialPacket = [];
            else throw new Error("Invalid head of packet");
          } else if (inEscape) {
            inEscape = false;
            if (b == 0xdc) partialPacket.push(0xc0);
            else if (b == 0xdd) partialPacket.push(0xdb);
            else throw new Error("Invalid SLIP escape");
          } else if (b == 0xdb) inEscape = true;
          else if (b == 0xc0) return partialPacket;
          else partialPacket.push(b);
        }
      }
    }
    async getResponse(opcode, timeout = DEFAULT_TIMEOUT) {
      for (let i = 0; i < 100; i++) {
        const packet = await this.readPacket(timeout);
        if (packet.length < 8) continue;
        const [resp, opRet, _lenRet, val] = unpack("<BBHI", packet.slice(0, 8));
        if (resp != 1) continue;
        const data = packet.slice(8);
        if (opcode == null || opRet == opcode) return [val, data];
        if (data[0] != 0 && data[1] == ROM_INVALID_RECV_MSG) throw new Error(`Invalid command ${toHex(opcode)}`);
      }
      throw "Response doesn't match request";
    }
    checksum(data, state = ESP_CHECKSUM_MAGIC) { for (let b of data) state ^= b; return state; }
    getFlashWriteSize() { return this.IS_STUB ? STUB_FLASH_WRITE_SIZE : FLASH_WRITE_SIZE; }
    async flashData(binaryData, updateProgress, offset = 0) {
      let uncompressedFilesize = binaryData.byteLength;
      let dataToFlash = binaryData;
      await this.flashBegin(uncompressedFilesize, offset);
      let block = [], seq = 0, written = 0, position = 0;
      let flashWriteSize = this.getFlashWriteSize();
      let filesize = uncompressedFilesize;
      while (filesize - position > 0) {
        if (filesize - position >= flashWriteSize) block = Array.from(new Uint8Array(dataToFlash, position, flashWriteSize));
        else {
          block = Array.from(new Uint8Array(dataToFlash, position, filesize - position));
          block = block.concat(new Array(flashWriteSize - block.length).fill(0xff));
        }
        await this.flashBlock(block, seq);
        seq += 1;
        written += block.length;
        position += flashWriteSize;
        updateProgress(Math.min(written, uncompressedFilesize), uncompressedFilesize);
      }
      await this.flashFinish();
    }
    async flashBlock(data, seq, timeout = DEFAULT_TIMEOUT) {
      await this.checkCommand(ESP_FLASH_DATA, pack("<IIII", data.length, seq, 0, 0).concat(data), this.checksum(data), timeout);
    }
    async flashBegin(size = 0, offset = 0, encrypted = false) {
      if (this.chipFamily !== CHIP_FAMILY_ESP8266) {
        await this.checkCommand(ESP_SPI_ATTACH, new Array(8).fill(0));
      }
      let flashWriteSize = this.getFlashWriteSize();
      let numBlocks = Math.ceil(size / flashWriteSize);
      let eraseSize = size;
      if (this.chipFamily !== CHIP_FAMILY_ESP8266) eraseSize = alignUp(size, FLASH_SECTOR_SIZE);
      let timeout = this.IS_STUB ? DEFAULT_TIMEOUT : timeoutPerMb(ERASE_REGION_TIMEOUT_PER_MB, size);
      let buffer = pack("<IIII", eraseSize, numBlocks, flashWriteSize, offset);
      if ([CHIP_FAMILY_ESP32, CHIP_FAMILY_ESP32S2, CHIP_FAMILY_ESP32S3, CHIP_FAMILY_ESP32C2, CHIP_FAMILY_ESP32C3, CHIP_FAMILY_ESP32C6, CHIP_FAMILY_ESP32H2].includes(this.chipFamily))
        buffer = buffer.concat(pack("<I", encrypted ? 1 : 0));
      this.logger.log(`Erase size ${eraseSize}, blocks ${numBlocks}, offset ${toHex(offset,4)}`);
      await this.checkCommand(ESP_FLASH_BEGIN, buffer, 0, timeout);
    }
    async flashFinish() { await this.checkCommand(ESP_FLASH_END, pack("<I", 1)); }
    async writeToStream(data) {
      const writer = this.port.writable.getWriter();
      await writer.write(new Uint8Array(data));
      try { writer.releaseLock(); } catch(err) {}
    }
    async disconnect() {
      await this.port.writable.getWriter().close();
      if (this._reader) this._reader.cancel();
      this.connected = false;
    }
    async sync() {
      for (let i = 0; i < 5; i++) {
        this._inputBuffer.length = 0;
        let response = await this._sync();
        if (response) { await sleep(100); return true; }
        await sleep(100);
      }
      throw new Error("Sync failed");
    }
    async _sync() {
      await this.sendCommand(ESP_SYNC, SYNC_PACKET);
      for (let i = 0; i < 8; i++) {
        try {
          let [_reply, data] = await this.getResponse(ESP_SYNC, SYNC_TIMEOUT);
          if (data.length > 1 && data[0] == 0 && data[1] == 0) return true;
        } catch(err) {}
      }
      return false;
    }
  }
  let activePort = null, esploader = null, flashingActive = false, selectedFirmwareData = null, selectedFirmwareName = null;
  const selectPortBtn = document.getElementById('selectPortBtn'), portStatusSpan = document.getElementById('portStatus');
  const flashBtn = document.getElementById('flashActionBtn'), progressFill = document.getElementById('progressFill');
  const progressPercentSpan = document.getElementById('progressPercent'), logContainer = document.getElementById('logTerminal');
  const activeFirmwareDisplay = document.getElementById('activeFirmwareDisplay'), sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay'), menuToggle = document.getElementById('menuToggleBtn');
  const searchInput = document.getElementById('searchFirmware');
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
  menuToggle.addEventListener('click', (e) => { e.stopPropagation(); if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
  overlay.addEventListener('click', closeSidebar);
  window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });
  function addLog(msg, type='info') {
    const div = document.createElement('div'); div.className = 'log-line';
    const prefix = document.createElement('span'); prefix.className = 'log-prefix'; prefix.innerText = '>';
    const text = document.createElement('span'); text.className = 'log-text';
    if (type === 'error') text.style.color = '#ff9e9e';
    if (type === 'success') text.style.fontWeight = '500';
    text.innerText = msg;
    div.appendChild(prefix); div.appendChild(text);
    logContainer.appendChild(div); logContainer.scrollTop = logContainer.scrollHeight;
    while(logContainer.children.length > 200) logContainer.removeChild(logContainer.firstChild);
  }
  function updateProgress(percent) { const p = Math.min(100, Math.max(0, percent)); progressFill.style.width = `${p}%`; progressPercentSpan.innerText = `${Math.floor(p)}%`; }
  function resetProgress() { updateProgress(0); }
  function updateFlashButtonState() { flashBtn.disabled = (flashingActive || !activePort || !selectedFirmwareData); }
  function setControlsEnabled(enabled) { selectPortBtn.disabled = !enabled; updateFlashButtonState(); }
  function updatePortUI() {
    if (activePort) { const info = activePort.getInfo(); const name = info.usbProductName || info.friendlyName || 'ESP32'; portStatusSpan.innerHTML = `<i class="fas fa-link"></i> Connected: ${name}`; }
    else { portStatusSpan.innerHTML = `<i class="fas fa-circle-notch"></i> No port selected`; }
  }
  async function closeSerial() { if (esploader) await esploader.disconnect(); if (activePort) { try { await activePort.close(); } catch(e) {} activePort = null; } }
  async function connectToPort() {
    if (flashingActive) { addLog("Flashing in progress", "error"); return; }
    if (!('serial' in navigator)) { addLog("Web Serial API not supported", "error"); return; }
    try {
      if (activePort) await closeSerial();
      const port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });
      activePort = port;
      const logger = { log: (msg) => addLog(msg, 'info') };
      esploader = new ESPLoader(port, logger);
      await esploader.initialize();
      updatePortUI(); addLog(`Connected @115200 baud`, "success"); updateFlashButtonState();
    } catch (err) { addLog(`Port error: ${err.message}`, "error"); }
  }
  async function loadFirmware(name, file) {
    addLog(`Loading ${name}...`, "info");
    try {
      const response = await fetch(file);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const buffer = await response.arrayBuffer();
      const data = new Uint8Array(buffer);
      selectedFirmwareData = data; selectedFirmwareName = name;
      activeFirmwareDisplay.innerHTML = `<i class="fas fa-check-circle"></i> Active firmware: <strong>${name}</strong> (${(data.length/1024).toFixed(2)} KB)`;
      addLog(`Firmware ready: ${name} (${data.length} bytes)`, "success");
      document.querySelectorAll('.fw-item').forEach(el => { if (el.getAttribute('data-file') === file) el.classList.add('active'); else el.classList.remove('active'); });
      updateFlashButtonState();
    } catch (e) { addLog(`Failed to load ${name}: ${e.message}`, "error"); selectedFirmwareData = null; activeFirmwareDisplay.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Failed to load ${name}`; flashBtn.disabled = true; }
  }
  async function startFlashing() {
    if (flashingActive) return;
    if (!activePort || !esploader) { addLog("No serial port connected", "error"); return; }
    if (!selectedFirmwareData) { addLog("No firmware selected", "error"); return; }
    flashingActive = true; setControlsEnabled(false); resetProgress();
    addLog(`Starting flash: ${selectedFirmwareName} (${(selectedFirmwareData.length/1024).toFixed(2)} KB)`, "info");
    try {
      await esploader.hardReset(true);
      await esploader.sync();
      addLog("Connected to ESP32 in download mode", "success");
      const writeCallback = (written, total) => { const percent = (written / total) * 100; updateProgress(percent); };
      addLog("Writing firmware to address 0x10000...", "info");
      await esploader.flashData(selectedFirmwareData.buffer, writeCallback, 0x10000);
      updateProgress(100); addLog("Firmware written successfully!", "success");
      addLog("Rebooting device...", "info");
      await esploader.hardReset(false);
      addLog("Device rebooted. Firmware is now active.", "success");
    } catch (err) { addLog(`Flashing error: ${err.message}`, "error"); }
    finally { flashingActive = false; setControlsEnabled(true); await closeSerial(); updatePortUI(); }
  }
  function filterFirmwares() {
    const term = searchInput.value.toLowerCase();
    document.querySelectorAll('.fw-item').forEach(item => {
      const name = item.getAttribute('data-fw').toLowerCase();
      const desc = item.querySelector('.fw-desc')?.innerText.toLowerCase() || '';
      item.style.display = (name.includes(term) || desc.includes(term)) ? '' : 'none';
    });
  }
  document.querySelectorAll('.fw-item').forEach(item => {
    item.addEventListener('click', async () => {
      if (flashingActive) { addLog("Cannot change firmware while flashing", "error"); return; }
      const name = item.getAttribute('data-fw'), file = item.getAttribute('data-file');
      await loadFirmware(name, file);
      if (window.innerWidth <= 768) closeSidebar();
    });
  });
  searchInput.addEventListener('input', filterFirmwares);
  selectPortBtn.addEventListener('click', connectToPort);
  flashBtn.addEventListener('click', startFlashing);
  if (!('serial' in navigator)) { addLog("Web Serial API unavailable", "error"); selectPortBtn.disabled = true; }
  addLog("WebFlasher ready. Select firmware, connect serial port, then click FLASH.", "info");
})();
</script>
